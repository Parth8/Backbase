openapi: 3.0.3
info:
  title: Grand Central Payments Connector
  version: 1.0.0
  description: |
    Backbase Grand Central Payments Connector v1.0.
    
    **Scope:** SEPA Credit Transfer (SCT) only.
    
    First production version. Deployed for Apex Banking Group, Ireland.
    Supports single-rail payment initiation for domestic and intra-SEPA euro transfers
    via the EBA Clearing STEP2 infrastructure.
    
    **Failure response note:** The failure response in this version contains `errorCode`
    and `errorMessage` as optional fields with no enforced structure. No origin tagging.
    No payment state classification. Schema-valid responses may contain empty fields.
    Ops teams must investigate connector and scheme logs manually to determine failure origin.
    
    **Known limitation (documented post-go-live, Apex Bank):**
    ISO 20022 pain.002 reason codes embedded in nested XML elements are extracted at
    the top-level fault text only. Structured reason codes (e.g. AC04, AM04) must be
    inferred by the consuming system from the errorMessage string prefix, which is
    populated via a bank-specific custom response transformer in the Apex deployment.
    This transformer is NOT part of the platform baseline.

servers:
  - url: https://gc.meridianbank.nl/api/v1
    description: Production
  - url: https://gc-uat.meridianbank.nl/api/v1
    description: UAT

tags:
  - name: Payments
    description: Payment initiation operations

paths:
  /payments/initiate:
    post:
      tags:
        - Payments
      summary: Initiate a SEPA Credit Transfer
      description: |
        Initiates a SEPA Credit Transfer (SCT) payment from the bank's core banking system
        through Grand Central to the EBA Clearing STEP2 rail.
        
        The connector translates the request into ISO 20022 pacs.008 format and submits
        to the scheme. The response is translated back and returned to the core.
        
        **Idempotency:** The `paymentId` field serves as the idempotency key.
        Duplicate requests with the same `paymentId` within a 24-hour window
        will return the original response without re-submitting to the scheme.
      operationId: initiatePayment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentInitiationRequestV1'
            examples:
              domestic_transfer:
                summary: Standard domestic SCT
                value:
                  paymentId: "MER-PAY-20250317-000042"
                  debtor:
                    name: "Jan de Vries"
                    account: "NL91ABNA0417164300"
                  creditor:
                    name: "Maria Jansen"
                    account: "NL02ABNA0123456789"
                  amount:
                    value: 500.00
                    currency: "EUR"
                  remittanceInfo: "Rent March 2025"
                  requestedExecutionDate: "2025-03-17"
      responses:
        '202':
          description: Payment accepted for processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentAcceptedResponseV1'
              examples:
                accepted:
                  summary: Payment accepted by scheme
                  value:
                    paymentId: "MER-PAY-20250317-000042"
                    gcTransactionId: "gc-a1b2c3d4-e5f6-7890-abcdef123456"
                    status: "ACCEPTED"
                    schemeReference: "EBACLRNG20250317048291"
                    acceptedTimestamp: "2025-03-17T09:15:32.441Z"
        '200':
          description: |
            Payment processed but resulted in failure.
            Note: This version returns HTTP 200 for both success and failure cases
            where the request itself was valid. HTTP 4xx is reserved for malformed requests.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentFailureResponseV1'
              examples:
                scheme_rejection_structured:
                  summary: Scheme rejection with reason code (Apex custom transformer applied)
                  value:
                    paymentId: "MER-PAY-20250317-000043"
                    gcTransactionId: "gc-b2c3d4e5-f6a7-8901-bcdef1234567"
                    status: "FAILED"
                    errorCode: "AC04"
                    errorMessage: "Closed Account Number"
                scheme_rejection_generic:
                  summary: Scheme rejection without structured reason (baseline behaviour)
                  value:
                    paymentId: "MER-PAY-20250317-000044"
                    gcTransactionId: "gc-c3d4e5f6-a7b8-9012-cdef12345678"
                    status: "FAILED"
                    errorCode: ""
                    errorMessage: "Payment rejected by scheme"
                empty_response:
                  summary: Empty failure response (no handler triggered)
                  value:
                    paymentId: "MER-PAY-20250317-000045"
                    gcTransactionId: "gc-d4e5f6a7-b8c9-0123-def123456789"
                    status: "FAILED"
                    errorCode: ""
                    errorMessage: ""
        '400':
          description: Malformed request - schema validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '500':
          description: Internal connector error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalErrorResponse'

components:
  schemas:

    PaymentInitiationRequestV1:
      type: object
      required:
        - paymentId
        - debtor
        - creditor
        - amount
        - requestedExecutionDate
      properties:
        paymentId:
          type: string
          maxLength: 35
          description: Idempotency key assigned by the core banking system. Must be unique per payment.
          example: "MER-PAY-20250317-000042"
        debtor:
          $ref: '#/components/schemas/PartyV1'
        creditor:
          $ref: '#/components/schemas/PartyV1'
        amount:
          $ref: '#/components/schemas/AmountV1'
        remittanceInfo:
          type: string
          maxLength: 140
          description: Unstructured remittance information. Passed through to the scheme.
          example: "Rent March 2025"
        requestedExecutionDate:
          type: string
          format: date
          description: |
            Requested execution date in ISO 8601 format (YYYY-MM-DD).
            For SCT, this is the D+1 settlement date. Must be a TARGET2 business day.
          example: "2025-03-17"

    PartyV1:
      type: object
      required:
        - name
        - account
      properties:
        name:
          type: string
          maxLength: 70
          description: Full name of the party.
          example: "Jan de Vries"
        account:
          type: string
          description: IBAN of the party. Must be valid per ISO 13616 (MOD-97 checksum).
          pattern: '^[A-Z]{2}[0-9]{2}[A-Z0-9]{1,30}$'
          example: "NL91ABNA0417164300"

    AmountV1:
      type: object
      required:
        - value
        - currency
      properties:
        value:
          type: number
          format: decimal
          minimum: 0.01
          description: Payment amount. Two decimal places.
          example: 500.00
        currency:
          type: string
          pattern: '^[A-Z]{3}$'
          description: ISO 4217 currency code. Must be EUR for SCT.
          enum:
            - EUR
          example: "EUR"

    PaymentAcceptedResponseV1:
      type: object
      properties:
        paymentId:
          type: string
          description: Echo of the paymentId from the request.
          example: "MER-PAY-20250317-000042"
        gcTransactionId:
          type: string
          format: uuid
          description: Grand Central assigned transaction identifier.
          example: "gc-a1b2c3d4-e5f6-7890-abcdef123456"
        status:
          type: string
          enum:
            - ACCEPTED
          example: "ACCEPTED"
        schemeReference:
          type: string
          description: EBA Clearing STEP2 scheme reference for the accepted payment.
          example: "EBACLRNG20250317048291"
        acceptedTimestamp:
          type: string
          format: date-time
          description: UTC timestamp when the scheme accepted the payment.
          example: "2025-03-17T09:15:32.441Z"

    PaymentFailureResponseV1:
      type: object
      description: |
        Failure response returned when a payment cannot be processed.
        
        **IMPORTANT - v1.0 limitation:** `errorCode` and `errorMessage` are both optional
        and may be empty strings or absent entirely. The connector passes through whatever
        the scheme or core returns. No origin tagging is present in this version.
        Consumers must not assume these fields will be populated.
      properties:
        paymentId:
          type: string
          description: Echo of the paymentId from the request.
          example: "MER-PAY-20250317-000043"
        gcTransactionId:
          type: string
          format: uuid
          example: "gc-b2c3d4e5-f6a7-8901-bcdef1234567"
        status:
          type: string
          enum:
            - FAILED
          example: "FAILED"
        errorCode:
          type: string
          description: |
            Error code. May be an ISO 20022 pain.002 reason code (e.g. AC04, AM04),
            a T24 proprietary code (e.g. AC.CLOSED, INSUFF.FUNDS), a connector-generated
            code, or an empty string. No controlled vocabulary enforced in this version.
          example: "AC04"
        errorMessage:
          type: string
          description: |
            Human-readable error message. May be populated, generic, or empty.
            In the Apex deployment, a custom transformer prefixes this field with
            the pain.002 reason code extracted from nested XML elements.
            This behaviour is NOT present in the platform baseline.
          example: "Closed Account Number"

    ValidationErrorResponse:
      type: object
      properties:
        status:
          type: string
          enum:
            - VALIDATION_FAILED
        errorCode:
          type: string
          example: "INVALID_REQUEST"
        errorMessage:
          type: string
          example: "Request body failed schema validation"
        details:
          type: array
          items:
            type: string
          example:
            - "amount.currency: must be EUR"
            - "debtor.account: IBAN checksum validation failed"

    InternalErrorResponse:
      type: object
      properties:
        status:
          type: string
          enum:
            - INTERNAL_ERROR
        errorCode:
          type: string
          example: "CONNECTOR_INTERNAL_ERROR"
        errorMessage:
          type: string
          example: "An unexpected error occurred. Contact Backbase support with the gcTransactionId."
        gcTransactionId:
          type: string
          example: "gc-e5f6a7b8-c9d0-1234-ef1234567890"

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT bearer token issued by Grand Central's authentication service.

security:
  - BearerAuth: []
