openapi: 3.0.3
info:
  title: Grand Central Payments Connector
  version: 2.0.0
  description: |
    Backbase Grand Central Payments Connector v2.0.
    
    **Scope:** SEPA Credit Transfer (SCT), SEPA Credit Transfer Instant (SCT Inst),
    and SWIFT cross-border wire transfers.
    
    Deployed for Meridian Bank NV, Netherlands. First implementation to support
    three payment rails simultaneously. Adds SWIFT cross-border capability for
    retail customers initiating international transfers.
    
    **Changes from v1.5:**
    - Added `SWIFT` to `paymentMethod` enum.
    - Added `instructionId` (separate from `endToEndId` per ISO 20022 message standards).
    - Added `serviceLevel` for SWIFT urgency routing (URGP, NURG).
    - Added `debtorAgent` and `creditorAgent` for SWIFT BIC routing.
    - Added `intermediaryAgent` for SWIFT correspondent chain specification.
    - Added `debtor.address` and `creditor.address` (required for SWIFT, optional for SEPA).
    - Replaced flat `amount` with `instructedAmount` to support multi-currency.
    - Added `equivalentAmount` for FX cases (SWIFT only).
    - Added `chargeBearer` for SWIFT charge allocation.
    - Added `purposeCode` and `categoryPurpose` for ISO 20022 alignment.
    - Added `failedTimestamp` to failure response.
    
    **Failure response note:**
    The failure response structure remains permissive from v1.5. `errorCode` and
    `errorMessage` are optional with no enforced controlled vocabulary. No origin tagging.
    No payment state classification. No retry semantics.
    
    This is the gap identified during Meridian UAT Cycle 3 (March 2025).
    SWIFT adds three new failure origin categories not covered by prior versions:
    correspondent bank rejections (downstream, non-standard codes), compliance holds
    (OFAC/AML screening, returned as HOLD state which this spec cannot represent),
    and settlement delays (payment in-flight but not confirmed within the connector
    wait window, incorrectly surfaced as FAILED).
    
    None of these failure patterns are handled by prior bank-specific patches
    (Apex v1.0.1 custom transformer, Sparkasse v1.5.x exception handler) because
    those patches were not promoted to the platform baseline.
    
    **Production use:** This spec defines Meridian's connector contract for Wave 1 go-live.
    Wave 2 (SDD) and Wave 3 (POS, ECOM) are planned for future versions.

servers:
  - url: https://gc.meridianbank.nl/api/v2
    description: Production
  - url: https://gc-uat.meridianbank.nl/api/v2
    description: UAT

tags:
  - name: Payments
    description: Payment initiation operations

paths:
  /payments/initiate:
    post:
      tags:
        - Payments
      summary: Initiate a payment (SCT, SCT Inst, or SWIFT)
      description: |
        Initiates a payment through the Grand Central Payments Connector.
        
        The `paymentMethod` field routes the payment to the appropriate rail:
        - **SCT:** EBA Clearing STEP2. Settlement D+1 TARGET2 business day.
        - **SCT_INST:** EBA Clearing RT1. Settlement within 10 seconds, 24/7/365. Max EUR 100,000.
        - **SWIFT:** SWIFT gpi network. Settlement T+1 to T+3 depending on correspondent chain.
        
        **Field requirements by payment method:**
        SWIFT requires additional fields not needed for SEPA:
        `debtorAgent.bic`, `creditorAgent.bic`, `debtor.address.country`,
        `creditor.address.country`, `chargeBearer`, `serviceLevel`.
        For SCT and SCT_INST, these fields are ignored if provided.
        
        **No automatic fallback:** The connector executes against the specified rail only.
        If the rail is unavailable, the payment fails. The core is responsible for
        rail selection and fallback decisions. SCT, SCT_INST, and SWIFT carry different
        customer promises (timing, finality, cost). Automatic rerouting would violate
        the payment intent.
        
        **Idempotency:** `paymentId` is the idempotency key. Duplicate requests within
        24 hours return the original response without re-submitting to the scheme.
      operationId: initiatePayment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentInitiationRequestV2'
            examples:
              sct_transfer:
                summary: SCT - domestic euro transfer
                value:
                  paymentId: "MER-PAY-20250317-000200"
                  instructionId: "GC-INSTR-A1B2C3D4E5F6G7H8I9J0"
                  endToEndId: "E2E-20250317-MER-000200"
                  paymentMethod: "SCT"
                  debtor:
                    name: "Jan de Vries"
                    account: "NL91ABNA0417164300"
                  creditor:
                    name: "Klaus Schmidt"
                    account: "DE89370400440532013000"
                  instructedAmount:
                    value: 1200.00
                    currency: "EUR"
                  remittanceInfo: "Invoice INV-2025-0441"
                  requestedExecutionDate: "2025-03-17"
              sct_inst_transfer:
                summary: SCT Inst - real-time payment
                value:
                  paymentId: "MER-PAY-20250317-000201"
                  instructionId: "GC-INSTR-B2C3D4E5F6G7H8I9J0K1"
                  endToEndId: "E2E-20250317-MER-000201"
                  paymentMethod: "SCT_INST"
                  serviceLevel: "INST"
                  debtor:
                    name: "Sophie de Boer"
                    account: "NL39INGB0248173660"
                  creditor:
                    name: "Marie Dubois"
                    account: "FR7630006000011234567890189"
                  instructedAmount:
                    value: 350.00
                    currency: "EUR"
                  remittanceInfo: "Shared expenses"
                  requestedExecutionDate: "2025-03-17"
              swift_transfer_usd:
                summary: SWIFT - cross-border USD transfer to US
                value:
                  paymentId: "MER-PAY-20250317-000202"
                  instructionId: "GC-INSTR-C3D4E5F6G7H8I9J0K1L2"
                  endToEndId: "E2E-20250317-MER-000202"
                  paymentMethod: "SWIFT"
                  serviceLevel: "URGP"
                  debtor:
                    name: "Rajesh Kumar"
                    account: "NL53TRIO0212171773"
                    address:
                      country: "NL"
                      city: "Amsterdam"
                      addressLine: "Kalverstraat 12"
                      postCode: "1012NX"
                  debtorAgent:
                    bic: "ABNANL2A"
                    name: "ABN AMRO Bank NV"
                  creditor:
                    name: "Priya Kumar"
                    account: "124567890"
                    address:
                      country: "US"
                      city: "New York"
                      addressLine: "123 Main Street"
                      postCode: "10001"
                  creditorAgent:
                    bic: "CHASUS33"
                    name: "JP Morgan Chase Bank"
                  instructedAmount:
                    value: 2500.00
                    currency: "USD"
                  equivalentAmount:
                    value: 2301.25
                    currency: "EUR"
                  chargeBearer: "SHAR"
                  purposeCode: "SUPP"
                  categoryPurpose: "FMLY"
                  remittanceInfo: "Family support March 2025"
                  requestedExecutionDate: "2025-03-17"
              swift_transfer_eur:
                summary: SWIFT - cross-border EUR transfer to Turkey
                value:
                  paymentId: "MER-PAY-20250317-000203"
                  instructionId: "GC-INSTR-D4E5F6G7H8I9J0K1L2M3"
                  endToEndId: "E2E-20250317-MER-000203"
                  paymentMethod: "SWIFT"
                  serviceLevel: "NURG"
                  debtor:
                    name: "Kasim Yilmaz"
                    account: "NL43KNAB0256732189"
                    address:
                      country: "NL"
                      city: "Rotterdam"
                      addressLine: "Blaak 40"
                      postCode: "3011TA"
                  debtorAgent:
                    bic: "ABNANL2A"
                  creditor:
                    name: "Ahmet Yildiz"
                    account: "TR330006100519786457841326"
                    address:
                      country: "TR"
                      city: "Istanbul"
                      addressLine: "Istiklal Caddesi 45"
                  creditorAgent:
                    bic: "ISBKTRIS"
                    name: "Isbank"
                  intermediaryAgent:
                    bic: "DEUTDEFF"
                    name: "Deutsche Bank AG"
                  instructedAmount:
                    value: 800.00
                    currency: "EUR"
                  chargeBearer: "SHAR"
                  remittanceInfo: "Family transfer"
                  requestedExecutionDate: "2025-03-17"
      responses:
        '202':
          description: Payment accepted for processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentAcceptedResponseV2'
              examples:
                sct_accepted:
                  summary: SCT accepted
                  value:
                    paymentId: "MER-PAY-20250317-000200"
                    gcTransactionId: "gc-11223344-5566-7788-99aabbccddee"
                    instructionId: "GC-INSTR-A1B2C3D4E5F6G7H8I9J0"
                    endToEndId: "E2E-20250317-MER-000200"
                    status: "ACCEPTED"
                    railName: "SCT"
                    schemeReference: "EBACLRNG20250317059182"
                    acceptedTimestamp: "2025-03-17T11:04:22.341Z"
                    expectedSettlement: "2025-03-18T08:00:00.000Z"
                sct_inst_accepted:
                  summary: SCT Inst accepted
                  value:
                    paymentId: "MER-PAY-20250317-000201"
                    gcTransactionId: "gc-aabbccdd-eeff-0011-2233445566778899"
                    instructionId: "GC-INSTR-B2C3D4E5F6G7H8I9J0K1"
                    endToEndId: "E2E-20250317-MER-000201"
                    status: "ACCEPTED"
                    railName: "SCT_INST"
                    schemeReference: "RT1INST202503170049182"
                    acceptedTimestamp: "2025-03-17T11:04:23.841Z"
                    expectedSettlement: "2025-03-17T11:04:27.120Z"
                swift_accepted:
                  summary: SWIFT accepted - gpi UETR assigned
                  value:
                    paymentId: "MER-PAY-20250317-000202"
                    gcTransactionId: "gc-00112233-4455-6677-8899aabbccddeeff"
                    instructionId: "GC-INSTR-C3D4E5F6G7H8I9J0K1L2"
                    endToEndId: "E2E-20250317-MER-000202"
                    status: "ACCEPTED"
                    railName: "SWIFT"
                    schemeReference: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                    acceptedTimestamp: "2025-03-17T11:04:28.991Z"
                    expectedSettlement: "2025-03-19T17:00:00.000Z"
        '200':
          description: |
            Payment processed but resulted in failure.
            
            See failure response examples for the range of possible outputs.
            Note that `errorCode` and `errorMessage` are optional in this version.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentFailureResponseV2'
              examples:
                scheme_rejection_sepa:
                  summary: SEPA scheme rejection - structured (pain.002 reason code)
                  value:
                    paymentId: "MER-PAY-20250317-000210"
                    gcTransactionId: "gc-aabb1122-ccdd-3344-eeff55667788"
                    instructionId: "GC-INSTR-X1Y2Z3A4B5C6D7E8F9G0"
                    endToEndId: "E2E-20250317-MER-000210"
                    status: "FAILED"
                    railName: "SCT_INST"
                    errorCode: "AC04"
                    errorMessage: "Closed Account Number"
                    failedTimestamp: "2025-03-17T11:10:44.221Z"
                t24_proprietary_partial:
                  summary: T24 core proprietary code - no translation (PARTIAL)
                  value:
                    paymentId: "MER-PAY-20250317-000211"
                    gcTransactionId: "gc-ccdd3344-eeff-5566-778899aabb"
                    instructionId: "GC-INSTR-Y2Z3A4B5C6D7E8F9G0H1"
                    endToEndId: "E2E-20250317-MER-000211"
                    status: "FAILED"
                    railName: ""
                    errorCode: "AC.CLOSED"
                    errorMessage: "Core rejected: AC.CLOSED"
                    failedTimestamp: "2025-03-17T11:11:08.883Z"
                sct_inst_timeout_blank:
                  summary: SCT Inst timeout - unhandled exception (BLANK)
                  value:
                    paymentId: "MER-PAY-20250317-000212"
                    gcTransactionId: "gc-eeff5566-7788-99aa-bbccdd112233"
                    instructionId: "GC-INSTR-Z3A4B5C6D7E8F9G0H1I2"
                    endToEndId: "E2E-20250317-MER-000212"
                    status: "FAILED"
                    railName: "SCT_INST"
                    errorCode: ""
                    errorMessage: ""
                    failedTimestamp: "2025-03-17T11:11:23.114Z"
                swift_correspondent_generic:
                  summary: SWIFT correspondent bank rejection - no parseable code (GENERIC)
                  value:
                    paymentId: "MER-PAY-20250317-000213"
                    gcTransactionId: "gc-778899aa-bbcc-dd11-2233eeff445566"
                    instructionId: "GC-INSTR-A4B5C6D7E8F9G0H1I2J3"
                    endToEndId: "E2E-20250317-MER-000213"
                    status: "FAILED"
                    railName: "SWIFT"
                    errorCode: "PAYMENT_FAILED"
                    errorMessage: "Payment failed downstream"
                    failedTimestamp: "2025-03-17T11:18:02.772Z"
                swift_compliance_hold_misrepresented:
                  summary: SWIFT compliance hold returned as FAILED (hold state not modelled)
                  value:
                    paymentId: "MER-PAY-20250317-000214"
                    gcTransactionId: "gc-aabb2233-ccdd-4455-667788eeff"
                    instructionId: "GC-INSTR-B5C6D7E8F9G0H1I2J3K4"
                    endToEndId: "E2E-20250317-MER-000214"
                    status: "FAILED"
                    railName: "SWIFT"
                    errorCode: "PAYMENT_FAILED"
                    errorMessage: "Payment could not be completed"
                    failedTimestamp: "2025-03-17T11:22:45.009Z"
                swift_settlement_delay_misrepresented:
                  summary: SWIFT settlement delay returned as FAILED (in-flight payment)
                  value:
                    paymentId: "MER-PAY-20250317-000215"
                    gcTransactionId: "gc-ccdd4455-eeff-6677-8899aabbccdd"
                    instructionId: "GC-INSTR-C6D7E8F9G0H1I2J3K4L5"
                    endToEndId: "E2E-20250317-MER-000215"
                    status: "FAILED"
                    railName: "SWIFT"
                    errorCode: "PAYMENT_FAILED"
                    errorMessage: "Settlement not confirmed within window"
                    failedTimestamp: "2025-03-17T11:45:18.334Z"
        '400':
          description: Malformed request - schema validation failed at connector level
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '500':
          description: Internal connector error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalErrorResponse'

components:
  schemas:

    PaymentInitiationRequestV2:
      type: object
      required:
        - paymentId
        - instructionId
        - endToEndId
        - paymentMethod
        - debtor
        - creditor
        - instructedAmount
        - requestedExecutionDate
      properties:
        paymentId:
          type: string
          maxLength: 35
          description: Idempotency key assigned by the core banking system.
          example: "MER-PAY-20250317-000200"
        instructionId:
          type: string
          maxLength: 35
          description: |
            Connector-to-scheme level instruction identifier.
            Distinct from endToEndId per ISO 20022 message standards.
            Assigned by Grand Central if not provided.
          example: "GC-INSTR-A1B2C3D4E5F6G7H8I9J0"
        endToEndId:
          type: string
          maxLength: 35
          description: |
            End-to-end identifier that travels through the entire payment chain
            from originating bank to beneficiary bank. Required for ISO 20022 compliance.
          example: "E2E-20250317-MER-000200"
        paymentMethod:
          type: string
          enum:
            - SCT
            - SCT_INST
            - SWIFT
          description: |
            Payment rail. Core specifies; connector executes. No fallback logic.
            
            SWIFT-specific fields (debtorAgent, creditorAgent, debtor.address,
            creditor.address, chargeBearer, serviceLevel) are required when
            paymentMethod is SWIFT. They are optional/ignored for SCT and SCT_INST.
          example: "SCT_INST"
        serviceLevel:
          type: string
          enum:
            - SEPA
            - INST
            - URGP
            - NURG
          description: |
            Service level code.
            SCT: SEPA (optional, implicit).
            SCT_INST: INST (optional, implicit).
            SWIFT: URGP (urgent) or NURG (non-urgent). Required for SWIFT.
          example: "URGP"
        debtor:
          $ref: '#/components/schemas/PartyV2'
        debtorAgent:
          $ref: '#/components/schemas/AgentV2'
          description: |
            The debtor's bank. Required for SWIFT (BIC used for SWIFT routing).
            Optional for SEPA (BIC derivable from IBAN).
        creditor:
          $ref: '#/components/schemas/PartyV2'
        creditorAgent:
          $ref: '#/components/schemas/AgentV2'
          description: |
            The creditor's bank. Required for SWIFT.
            Optional for SEPA.
        intermediaryAgent:
          $ref: '#/components/schemas/AgentV2'
          description: |
            Intermediary/correspondent bank. SWIFT only, optional.
            Used to specify a preferred correspondent in the banking chain.
        instructedAmount:
          $ref: '#/components/schemas/InstructedAmountV2'
        equivalentAmount:
          $ref: '#/components/schemas/EquivalentAmountV2'
          description: |
            The equivalent amount in the creditor's currency. Populated for FX cases (SWIFT only).
            Where instructedAmount currency differs from EUR, this field contains the EUR equivalent.
        chargeBearer:
          type: string
          enum:
            - DEBT
            - CRED
            - SHAR
          description: |
            Who bears the SWIFT correspondent charges.
            DEBT: Debtor bears all charges.
            CRED: Creditor bears all charges.
            SHAR: Charges shared (default for most retail SWIFT transfers).
            Required for SWIFT. Ignored for SEPA (SLEV charge bearer is implicit).
          example: "SHAR"
        purposeCode:
          type: string
          maxLength: 4
          description: |
            ISO 20022 purpose code identifying the nature of the payment.
            Examples: SUPP (supplier payment), SALA (salary), OTHR (other),
            GDDS (purchase of goods), FMLY (family maintenance).
          example: "SUPP"
        categoryPurpose:
          type: string
          maxLength: 4
          description: |
            ISO 20022 category purpose. Higher-level classification than purposeCode.
            Examples: CORT (corporate trade), FMLY (family), CASH (cash management).
          example: "CORT"
        remittanceInfo:
          type: string
          maxLength: 140
          description: Unstructured remittance information passed through to the creditor.
          example: "Invoice INV-2025-0441"
        requestedExecutionDate:
          type: string
          format: date
          description: |
            Requested execution date (YYYY-MM-DD).
            SCT: Settlement on the next TARGET2 business day on or after this date.
            SCT_INST: Accepted for reference; payment executes immediately regardless.
            SWIFT: Best-effort guidance; actual settlement depends on correspondent chain.
          example: "2025-03-17"

    PartyV2:
      type: object
      required:
        - name
        - account
      properties:
        name:
          type: string
          maxLength: 70
          description: Full legal name.
          example: "Rajesh Kumar"
        account:
          type: string
          description: |
            IBAN for SEPA payments and SEPA-zone SWIFT recipients.
            Account number (format varies by country) for non-SEPA SWIFT recipients.
          example: "NL91ABNA0417164300"
        bic:
          type: string
          pattern: '^[A-Z]{6}[A-Z0-9]{2}([A-Z0-9]{3})?$'
          description: |
            BIC/SWIFT code of the party (entity BIC, not the bank BIC).
            Optional for individuals. May be required for corporate SWIFT transfers.
          example: "ABNANL2A"
        address:
          $ref: '#/components/schemas/AddressV2'

    AgentV2:
      type: object
      properties:
        bic:
          type: string
          pattern: '^[A-Z]{6}[A-Z0-9]{2}([A-Z0-9]{3})?$'
          description: BIC/SWIFT code of the financial institution (8 or 11 characters).
          example: "CHASUS33"
        name:
          type: string
          maxLength: 70
          description: Name of the financial institution (optional, supplementary).
          example: "JP Morgan Chase Bank"

    AddressV2:
      type: object
      properties:
        country:
          type: string
          pattern: '^[A-Z]{2}$'
          description: ISO 3166-1 alpha-2 country code. Required for SWIFT payments (both debtor and creditor).
          example: "NL"
        city:
          type: string
          maxLength: 35
          description: City name.
          example: "Amsterdam"
        addressLine:
          type: string
          maxLength: 70
          description: Street address. Up to 70 characters. For SWIFT, recommended.
          example: "Kalverstraat 12"
        postCode:
          type: string
          maxLength: 16
          description: Postal/ZIP code.
          example: "1012NX"

    InstructedAmountV2:
      type: object
      required:
        - value
        - currency
      properties:
        value:
          type: number
          format: decimal
          minimum: 0.01
          description: |
            Amount instructed by the debtor.
            SCT/SCT_INST: Must be EUR. Max EUR 100,000 for SCT_INST.
            SWIFT: Any ISO 4217 currency supported by the SWIFT network.
          example: 2500.00
        currency:
          type: string
          pattern: '^[A-Z]{3}$'
          description: ISO 4217 currency code.
          example: "USD"

    EquivalentAmountV2:
      type: object
      properties:
        value:
          type: number
          format: decimal
          description: Equivalent amount in the target currency (EUR for Meridian).
          example: 2301.25
        currency:
          type: string
          pattern: '^[A-Z]{3}$'
          description: Currency of the equivalent amount.
          example: "EUR"

    PaymentAcceptedResponseV2:
      type: object
      properties:
        paymentId:
          type: string
          example: "MER-PAY-20250317-000200"
        gcTransactionId:
          type: string
          format: uuid
          description: Grand Central internal transaction identifier.
          example: "gc-11223344-5566-7788-99aabbccddee"
        instructionId:
          type: string
          example: "GC-INSTR-A1B2C3D4E5F6G7H8I9J0"
        endToEndId:
          type: string
          example: "E2E-20250317-MER-000200"
        status:
          type: string
          enum:
            - ACCEPTED
          example: "ACCEPTED"
        railName:
          type: string
          enum:
            - SCT
            - SCT_INST
            - SWIFT
          example: "SWIFT"
        schemeReference:
          type: string
          description: |
            Scheme-assigned reference.
            SCT: EBA Clearing STEP2 reference (EBACLRNG...).
            SCT_INST: EBA Clearing RT1 reference (RT1INST...).
            SWIFT: UETR (Unique End-to-end Transaction Reference) in UUID format.
              The UETR is the gpi tracking identifier. Use this to track the payment
              via SWIFT gpi tracker.
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        acceptedTimestamp:
          type: string
          format: date-time
          description: UTC timestamp of scheme acceptance confirmation.
          example: "2025-03-17T11:04:28.991Z"
        expectedSettlement:
          type: string
          format: date-time
          nullable: true
          description: |
            Expected settlement timestamp (UTC). Indicative only.
            SCT_INST: Seconds after acceptedTimestamp.
            SCT: Next TARGET2 business day open (08:00 CET).
            SWIFT: Estimated based on correspondent chain; T+1 to T+3 typical.
          example: "2025-03-19T17:00:00.000Z"

    PaymentFailureResponseV2:
      type: object
      description: |
        Failure response returned when a payment cannot be processed to completion.
        
        **v2.0 LIMITATION - THE GAP IDENTIFIED IN MERIDIAN UAT:**
        
        This response structure cannot distinguish between four distinct failure origins:
        1. CORE - T24 rejected the instruction before the connector reached the rail
        2. CONNECTOR - Grand Central itself failed (translation error, timeout, exception)
        3. RAIL - The SEPA scheme or SWIFT network rejected the payment
        4. DOWNSTREAM - A correspondent bank or compliance system downstream rejected it
        
        `errorCode` and `errorMessage` remain optional and unstructured. Ops teams
        cannot determine from this response alone which system to escalate to.
        Manual cross-reference of connector logs, T24 logs, and scheme receipts is required.
        
        Additionally, this version cannot represent:
        - HOLD state (payment in compliance review - surfaces incorrectly as FAILED)
        - PENDING state (payment accepted by rail but final settlement not yet confirmed)
        - UNKNOWN state (timeout where payment may or may not have reached the scheme)
        
        These limitations are the subject of the v3.0 contract redesign.
      properties:
        paymentId:
          type: string
          example: "MER-PAY-20250317-000213"
        gcTransactionId:
          type: string
          format: uuid
          example: "gc-778899aa-bbcc-dd11-2233eeff445566"
        instructionId:
          type: string
          nullable: true
          description: |
            May be absent if the connector failed before generating or submitting
            an instruction to the scheme (e.g. validation failure, core rejection
            before rail submission).
          example: "GC-INSTR-A4B5C6D7E8F9G0H1I2J3"
        endToEndId:
          type: string
          nullable: true
          example: "E2E-20250317-MER-000213"
        status:
          type: string
          enum:
            - FAILED
          example: "FAILED"
        railName:
          type: string
          nullable: true
          description: |
            Rail that was targeted.
            Presence: connector attempted submission to this rail.
            Absence: failure occurred before rail submission (core rejection or connector validation).
            Note: Presence does NOT confirm the rail received the payment.
          example: "SWIFT"
        errorCode:
          type: string
          nullable: true
          description: |
            Error code. May contain one of:
            - ISO 20022 pain.002 reason code: AC01, AC04, AC06, AM04, AM05, BE01, FF01,
              CNOR, DNOR, MS03, NARR, RR01, RR02, RR03, RR04 (SEPA)
            - SWIFT gpi rejection code: RJCT, ACWP (with status detail in errorMessage)
            - T24 proprietary code: AC.NOT.FOUND, AC.CLOSED, INSUFF.FUNDS,
              LIMIT.EXCEEDED, AC.BLOCKED, EB-CHK-VAL-XXX, SYS.ERROR
            - Connector-generated: TIMEOUT (Sparkasse exception handler, not present
              in baseline), PAYMENT_FAILED (generic fallback)
            - Empty string if no code was captured
          example: "PAYMENT_FAILED"
        errorMessage:
          type: string
          nullable: true
          description: |
            Human-readable error message. May be meaningful, generic ("Payment failed downstream"),
            or empty. No controlled vocabulary enforced.
          example: "Payment failed downstream"
        failedTimestamp:
          type: string
          format: date-time
          description: UTC timestamp when the failure was determined.
          example: "2025-03-17T11:18:02.772Z"

    ValidationErrorResponse:
      type: object
      description: Returned for HTTP 400 when the request fails connector-level schema validation.
      properties:
        status:
          type: string
          enum:
            - VALIDATION_FAILED
          example: "VALIDATION_FAILED"
        errorCode:
          type: string
          example: "INVALID_REQUEST"
        errorMessage:
          type: string
          example: "Request body failed schema validation"
        details:
          type: array
          items:
            type: string
          description: Field-level validation errors.
          example:
            - "creditor.account: IBAN checksum validation failed (MOD-97)"
            - "debtorAgent.bic: required for SWIFT paymentMethod"
            - "instructedAmount.value: must be greater than 0"

    InternalErrorResponse:
      type: object
      description: Returned for HTTP 500 on unexpected connector errors.
      properties:
        status:
          type: string
          enum:
            - INTERNAL_ERROR
          example: "INTERNAL_ERROR"
        errorCode:
          type: string
          example: "CONNECTOR_INTERNAL_ERROR"
        errorMessage:
          type: string
          example: "An unexpected error occurred. Contact Backbase support referencing the gcTransactionId."
        gcTransactionId:
          type: string
          description: Grand Central transaction ID for support reference.
          example: "gc-aabb2233-ccdd-4455-667788eeff"

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT bearer token issued by Grand Central's authentication service.

security:
  - BearerAuth: []
