openapi: 3.0.3
info:
  title: Grand Central Payments Connector
  version: 1.5.0
  description: |
    Backbase Grand Central Payments Connector v1.5.
    
    **Scope:** SEPA Credit Transfer (SCT) and SEPA Credit Transfer Instant (SCT Inst).
    
    Deployed for Sparkasse Mittelrhein, Germany. Adds real-time payment capability
    via the EBA Clearing RT1 infrastructure alongside the existing SCT STEP2 integration.
    
    **Changes from v1.0:**
    - Added `paymentMethod` field to request (SCT or SCT_INST). Core specifies which rail to use.
    - Added `endToEndId` field to request for ISO 20022 alignment.
    - Added `railName` to both success and failure responses.
    - SCT Inst: hard 10-second SLA enforced by the RT1 scheme. Payments not confirmed
      within 10 seconds are rejected by the scheme. The connector enforces a local
      timeout window of 12 seconds to allow for network overhead.
    
    **Failure response note:** The failure response structure is unchanged from v1.0.
    `errorCode` and `errorMessage` remain optional with no enforced structure.
    No origin tagging. No payment state classification.
    
    **Known limitation (documented post-UAT, Sparkasse):**
    SCT Inst timeouts that produce `java.net.SocketTimeoutException` are caught by a
    bank-specific exception handler added to the Sparkasse deployment. This handler
    returns `errorCode: "TIMEOUT"` and a fixed errorMessage string.
    This handler is scoped to SocketTimeoutException only. It does NOT cover:
    - `java.net.ConnectException` (connection-level timeout)
    - `java.net.ReadTimeoutException` (mid-response read timeout)
    - SWIFT rail timeouts (different exception model, out of scope for this version)
    This handler is configured in the Sparkasse connector deployment and is NOT
    part of the platform baseline. Future implementations will not inherit it.

servers:
  - url: https://gc.meridianbank.nl/api/v1.5
    description: Production
  - url: https://gc-uat.meridianbank.nl/api/v1.5
    description: UAT

tags:
  - name: Payments
    description: Payment initiation operations

paths:
  /payments/initiate:
    post:
      tags:
        - Payments
      summary: Initiate a SEPA payment (SCT or SCT Inst)
      description: |
        Initiates a SEPA Credit Transfer. The `paymentMethod` field determines
        which rail the connector uses:
        
        - **SCT:** Batch processing via EBA Clearing STEP2. Settlement D+1 on TARGET2
          business days. Maximum amount: EUR 999,999,999.99.
        - **SCT_INST:** Real-time processing via EBA Clearing RT1. Settlement within
          10 seconds, 24/7/365. Maximum amount: EUR 100,000 (scheme limit, configurable
          lower per bank).
        
        **Important:** The connector does not fall back between rails. If the core
        specifies SCT_INST and the RT1 scheme is unavailable, the payment fails.
        The core is responsible for fallback decisions. SLAs differ materially:
        SCT_INST is a real-time customer promise; SCT is a D+1 settlement promise.
        Automatic fallback would violate the customer's payment intent.
      operationId: initiatePayment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentInitiationRequestV15'
            examples:
              sct_transfer:
                summary: Standard SCT
                value:
                  paymentId: "MER-PAY-20250317-000100"
                  paymentMethod: "SCT"
                  endToEndId: "E2E-20250317-MER-000100"
                  debtor:
                    name: "Jan de Vries"
                    account: "NL91ABNA0417164300"
                  creditor:
                    name: "Klaus Schmidt"
                    account: "DE89370400440532013000"
                  amount:
                    value: 1200.00
                    currency: "EUR"
                  remittanceInfo: "Invoice INV-2025-0441"
                  requestedExecutionDate: "2025-03-17"
              sct_inst_transfer:
                summary: SCT Instant - real-time payment
                value:
                  paymentId: "MER-PAY-20250317-000101"
                  paymentMethod: "SCT_INST"
                  endToEndId: "E2E-20250317-MER-000101"
                  debtor:
                    name: "Sophie de Boer"
                    account: "NL39INGB0248173660"
                  creditor:
                    name: "Marie Dubois"
                    account: "FR7630006000011234567890189"
                  amount:
                    value: 350.00
                    currency: "EUR"
                  remittanceInfo: "Shared expenses March"
                  requestedExecutionDate: "2025-03-17"
      responses:
        '202':
          description: Payment accepted for processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentAcceptedResponseV15'
              examples:
                sct_accepted:
                  summary: SCT accepted
                  value:
                    paymentId: "MER-PAY-20250317-000100"
                    gcTransactionId: "gc-f1e2d3c4-b5a6-7890-fedcba987654"
                    status: "ACCEPTED"
                    railName: "SCT"
                    schemeReference: "EBACLRNG20250317052847"
                    acceptedTimestamp: "2025-03-17T10:22:11.883Z"
                sct_inst_accepted:
                  summary: SCT Inst accepted - real-time confirmation
                  value:
                    paymentId: "MER-PAY-20250317-000101"
                    gcTransactionId: "gc-a9b8c7d6-e5f4-3210-abcdef654321"
                    status: "ACCEPTED"
                    railName: "SCT_INST"
                    schemeReference: "RT1INST202503170019284"
                    acceptedTimestamp: "2025-03-17T10:22:14.231Z"
        '200':
          description: Payment processed but resulted in failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentFailureResponseV15'
              examples:
                scheme_rejection:
                  summary: SCT scheme rejection with reason code
                  value:
                    paymentId: "MER-PAY-20250317-000102"
                    gcTransactionId: "gc-b8c7d6e5-f4a3-2109-bcdef7654321"
                    status: "FAILED"
                    railName: "SCT"
                    errorCode: "AM04"
                    errorMessage: "Insufficient Funds"
                sct_inst_timeout_with_sparkasse_patch:
                  summary: SCT Inst timeout (Sparkasse patch applied)
                  value:
                    paymentId: "MER-PAY-20250317-000103"
                    gcTransactionId: "gc-c7d6e5f4-a3b2-1098-cdef87654321"
                    status: "FAILED"
                    railName: "SCT_INST"
                    errorCode: "TIMEOUT"
                    errorMessage: "Rail did not respond within timeout window"
                sct_inst_timeout_unhandled:
                  summary: SCT Inst timeout (ConnectException - NOT covered by Sparkasse patch)
                  value:
                    paymentId: "MER-PAY-20250317-000104"
                    gcTransactionId: "gc-d6e5f4a3-b2c1-0987-def987654321"
                    status: "FAILED"
                    railName: "SCT_INST"
                    errorCode: ""
                    errorMessage: ""
                core_t24_proprietary:
                  summary: T24 core proprietary code - no translation
                  value:
                    paymentId: "MER-PAY-20250317-000105"
                    gcTransactionId: "gc-e5f4a3b2-c1d0-9876-ef0987654321"
                    status: "FAILED"
                    railName: ""
                    errorCode: "INSUFF.FUNDS"
                    errorMessage: "Core rejected: INSUFF.FUNDS"
        '400':
          description: Malformed request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '500':
          description: Internal connector error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalErrorResponse'

components:
  schemas:

    PaymentInitiationRequestV15:
      type: object
      required:
        - paymentId
        - paymentMethod
        - debtor
        - creditor
        - amount
        - requestedExecutionDate
      properties:
        paymentId:
          type: string
          maxLength: 35
          description: Idempotency key assigned by the core banking system.
          example: "MER-PAY-20250317-000100"
        paymentMethod:
          type: string
          enum:
            - SCT
            - SCT_INST
          description: |
            Payment rail selection. Required. Core specifies which rail to use.
            The connector executes against the specified rail only.
            No automatic fallback between rails is performed.
          example: "SCT_INST"
        endToEndId:
          type: string
          maxLength: 35
          description: |
            End-to-end identification that flows through the scheme to the creditor's bank.
            Optional but recommended. If not provided, the connector generates one from paymentId.
          example: "E2E-20250317-MER-000100"
        debtor:
          $ref: '#/components/schemas/PartyV15'
        creditor:
          $ref: '#/components/schemas/PartyV15'
        amount:
          $ref: '#/components/schemas/AmountV15'
        remittanceInfo:
          type: string
          maxLength: 140
          description: Unstructured remittance information.
          example: "Invoice INV-2025-0441"
        requestedExecutionDate:
          type: string
          format: date
          description: |
            Requested execution date (YYYY-MM-DD).
            For SCT_INST: this field is accepted but the payment executes immediately.
            The scheme processes SCT_INST in real-time regardless of execution date.
          example: "2025-03-17"

    PartyV15:
      type: object
      required:
        - name
        - account
      properties:
        name:
          type: string
          maxLength: 70
          example: "Jan de Vries"
        account:
          type: string
          description: IBAN. Must be valid per ISO 13616. BIC is derived from IBAN for SEPA routing.
          pattern: '^[A-Z]{2}[0-9]{2}[A-Z0-9]{1,30}$'
          example: "NL91ABNA0417164300"

    AmountV15:
      type: object
      required:
        - value
        - currency
      properties:
        value:
          type: number
          format: decimal
          minimum: 0.01
          description: |
            Payment amount.
            SCT: max EUR 999,999,999.99.
            SCT_INST: max EUR 100,000 (EPC scheme limit; may be configured lower per bank).
          example: 350.00
        currency:
          type: string
          enum:
            - EUR
          description: Must be EUR. SEPA scheme is EUR-only.
          example: "EUR"

    PaymentAcceptedResponseV15:
      type: object
      properties:
        paymentId:
          type: string
          example: "MER-PAY-20250317-000100"
        gcTransactionId:
          type: string
          format: uuid
          example: "gc-f1e2d3c4-b5a6-7890-fedcba987654"
        status:
          type: string
          enum:
            - ACCEPTED
          example: "ACCEPTED"
        railName:
          type: string
          enum:
            - SCT
            - SCT_INST
          description: The rail that processed the payment.
          example: "SCT_INST"
        schemeReference:
          type: string
          description: |
            Scheme-assigned reference.
            SCT: EBA Clearing STEP2 reference.
            SCT_INST: EBA Clearing RT1 reference.
          example: "RT1INST202503170019284"
        acceptedTimestamp:
          type: string
          format: date-time
          description: UTC timestamp when the scheme confirmed acceptance.
          example: "2025-03-17T10:22:14.231Z"

    PaymentFailureResponseV15:
      type: object
      description: |
        Failure response.
        
        **v1.5 limitation:** `errorCode` and `errorMessage` remain optional and unstructured.
        `railName` is now present but optional (absent if connector failed before rail submission).
        
        No origin tagging. The consuming system cannot determine from this response alone
        whether the failure occurred at the T24 core, inside the Grand Central connector,
        or at the SEPA scheme. Manual log investigation is required.
      properties:
        paymentId:
          type: string
          example: "MER-PAY-20250317-000102"
        gcTransactionId:
          type: string
          format: uuid
          example: "gc-b8c7d6e5-f4a3-2109-bcdef7654321"
        status:
          type: string
          enum:
            - FAILED
          example: "FAILED"
        railName:
          type: string
          nullable: true
          description: |
            Rail that was targeted. May be absent if connector failed before routing.
            Presence indicates the connector attempted submission to the rail.
            Absence indicates failure occurred upstream of rail submission.
          example: "SCT_INST"
        errorCode:
          type: string
          nullable: true
          description: |
            Error code. May be:
            - ISO 20022 pain.002 reason code (AC04, AM04, etc.) for scheme rejections
            - T24 proprietary code (AC.CLOSED, INSUFF.FUNDS, EB-CHK-VAL-XXX) for core rejections
            - "TIMEOUT" for SCT_INST timeouts (Sparkasse deployment only, custom handler)
            - Empty string if no code was captured
          example: "AM04"
        errorMessage:
          type: string
          nullable: true
          description: |
            Human-readable error message. May be meaningful, generic, or empty.
          example: "Insufficient Funds"

    ValidationErrorResponse:
      type: object
      properties:
        status:
          type: string
          enum:
            - VALIDATION_FAILED
        errorCode:
          type: string
          example: "INVALID_REQUEST"
        errorMessage:
          type: string
          example: "Request body failed schema validation"
        details:
          type: array
          items:
            type: string
          example:
            - "paymentMethod: must be one of SCT, SCT_INST"
            - "amount.value: must be greater than 0"

    InternalErrorResponse:
      type: object
      properties:
        status:
          type: string
          enum:
            - INTERNAL_ERROR
        errorCode:
          type: string
          example: "CONNECTOR_INTERNAL_ERROR"
        errorMessage:
          type: string
          example: "An unexpected error occurred."
        gcTransactionId:
          type: string
          example: "gc-e5f4a3b2-c1d0-9876-ef0987654321"

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - BearerAuth: []
